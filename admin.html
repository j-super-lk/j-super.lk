<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J SUPER.LK - Admin Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #loginScreen { position: fixed; inset: 0; z-index: 100; background: #0f172a; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex overflow-hidden">

    <div id="loginScreen">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6 uppercase">Admin Login</h2>
            <input type="text" id="lUser" placeholder="Username" class="w-full p-3 mb-4 border rounded-xl bg-slate-50">
            <input type="password" id="lPass" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl bg-slate-50">
            <button onclick="handleLogin()" class="w-full bg-green-600 text-white font-black py-3 rounded-xl hover:bg-green-700">LOGIN</button>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-20">
        <div class="p-6 border-b border-slate-800 text-center">
            <h1 class="text-2xl font-black text-green-400">ADMIN</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="switchTab('ordersTab')" id="btnOrders" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">Orders</button>
            <button onclick="switchTab('productsTab')" id="btnInventory" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">Inventory</button>
            <button onclick="switchTab('reportsTab')" id="btnReports" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">POS & Reports</button>
            <button onclick="switchTab('adsTab')" id="btnAds" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800">Ads</button>
            <button onclick="switchTab('staffTab')" id="btnStaff" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 text-red-400 font-bold">Staff Management</button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="logout()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold">Logout</button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        
        <div id="ordersTab" class="tab-content active"><h2 class="text-2xl font-black mb-4">Live Orders</h2></div>
        
        <div id="productsTab" class="tab-content"><h2 class="text-2xl font-black mb-4">Inventory</h2></div>

        <div id="reportsTab" class="tab-content"><h2 class="text-2xl font-black mb-4">POS & Reports</h2></div>

        <div id="adsTab" class="tab-content"><h2 class="text-2xl font-black mb-4">Ads Management</h2></div>

        <div id="staffTab" class="tab-content">
            <h2 class="text-2xl font-black mb-4">Staff Management</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
                <h3 class="font-bold mb-4">Add New User</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="sUser" placeholder="Username" class="border p-2 rounded">
                    <input type="password" id="sPass" placeholder="Password" class="border p-2 rounded">
                    <div class="col-span-2 space-x-2">
                        <label><input type="checkbox" class="perm" value="orders"> Orders</label>
                        <label><input type="checkbox" class="perm" value="inventory"> Inventory</label>
                        <label><input type="checkbox" class="perm" value="reports"> Reports</label>
                        <label><input type="checkbox" class="perm" value="ads"> Ads</label>
                    </div>
                    <button onclick="addStaff()" class="bg-blue-600 text-white px-6 py-2 rounded-xl">Save Staff</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Default Super Admin Setup
        const defaultAdmin = { username: "admin", pass: "1234", role: "superadmin", permissions: ["orders", "inventory", "reports", "ads", "staff"] };
        
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('jsuper_loggedInUser'));
            if (!user) {
                document.getElementById('loginScreen').style.display = 'flex';
            } else {
                document.getElementById('loginScreen').style.display = 'none';
                applyPermissions(user);
            }
        }

        function handleLogin() {
            const u = document.getElementById('lUser').value;
            const p = document.getElementById('lPass').value;
            
            // Check in stored users
            const users = JSON.parse(localStorage.getItem('jsuper_users')) || [defaultAdmin];
            const found = users.find(x => x.username === u && x.pass === p);
            
            if (found) {
                localStorage.setItem('jsuper_loggedInUser', JSON.stringify(found));
                location.reload();
            } else {
                alert("වැරදි Username හෝ Password!");
            }
        }

        function logout() {
            localStorage.removeItem('jsuper_loggedInUser');
            location.reload();
        }

        function applyPermissions(user) {
            if (user.role === 'superadmin') return; // All allowed
            
            const perms = user.permissions;
            if (!perms.includes('orders')) document.getElementById('btnOrders').style.display = 'none';
            if (!perms.includes('inventory')) document.getElementById('btnInventory').style.display = 'none';
            if (!perms.includes('reports')) document.getElementById('btnReports').style.display = 'none';
            if (!perms.includes('ads')) document.getElementById('btnAds').style.display = 'none';
            document.getElementById('btnStaff').style.display = 'none'; // Only admin
        }

        function addStaff() {
            const username = document.getElementById('sUser').value;
            const password = document.getElementById('sPass').value;
            const perms = Array.from(document.querySelectorAll('.perm:checked')).map(cb => cb.value);
            
            let users = JSON.parse(localStorage.getItem('jsuper_users')) || [defaultAdmin];
            users.push({ username, pass: password, role: 'staff', permissions: perms });
            localStorage.setItem('jsuper_users', JSON.stringify(users));
            alert("නව සාමාජිකයා එකතු කරන ලදී!");
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        checkAuth();
    </script>
</body>
</html>

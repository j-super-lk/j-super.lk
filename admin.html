<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J SUPER.LK - Admin Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px);} to { opacity: 1; transform: translateY(0);} }
        @keyframes blinker { 50% { opacity: 0; } }
        .blink-me { animation: blinker 1s linear infinite; }
        /* Login Overlay */
        #loginScreen { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 h-screen flex overflow-hidden">

    <div id="loginScreen" class="hidden">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-6 uppercase">Admin Login</h2>
            <input type="text" id="lUser" placeholder="Username" class="w-full p-3 mb-4 border rounded-xl bg-slate-50">
            <input type="password" id="lPass" placeholder="Password" class="w-full p-3 mb-6 border rounded-xl bg-slate-50">
            <button onclick="handleLogin()" class="w-full bg-green-600 text-white font-black py-3 rounded-xl hover:bg-green-700">LOGIN</button>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-20 hidden md:flex shrink-0">
        <div class="p-6 border-b border-slate-800 text-center">
            <h1 class="text-2xl font-black text-green-400 uppercase tracking-widest border-2 border-green-500 rounded-lg p-2 bg-slate-800">Admin</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
            <button onclick="switchTab('ordersTab')" id="btnOrders" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center justify-between group">
                <span class="flex items-center gap-3"><i class="fa-solid fa-bell text-yellow-400"></i> Live Orders</span>
                <span id="orderBadge" class="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full hidden">0</span>
            </button>
            <button onclick="switchTab('reportsTab')" id="btnReports" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-chart-pie text-blue-400"></i> POS & Reports</button>
            <button onclick="switchTab('productsTab')" id="btnInventory" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-box text-green-400"></i> Inventory</button>
            <button onclick="switchTab('catsTab')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-tags text-pink-400"></i> Categories</button>
            <button onclick="switchTab('adsTab')" id="btnAds" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-image text-purple-400"></i> Banners / Ads</button>
            <button onclick="switchTab('settingsTab')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-gear text-orange-400"></i> Web Settings</button>
            <button onclick="switchTab('directorsTab')" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-slate-800 transition font-bold text-sm flex items-center gap-3"><i class="fa-solid fa-users text-teal-400"></i> Directors Board</button>
            <button onclick="switchTab('staffTab')" id="btnStaff" class="nav-btn w-full text-left px-4 py-3 rounded-xl hover:bg-red-900 transition font-bold text-sm flex items-center gap-3 text-red-300"><i class="fa-solid fa-user-shield"></i> Staff Management</button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="logout()" class="w-full text-center bg-red-600 hover:bg-red-700 text-white font-black py-3 rounded-xl transition shadow-lg mb-2">LOGOUT</button>
            <a href="index.html" class="w-full block text-center bg-green-600 hover:bg-green-700 text-white font-black py-3 rounded-xl transition shadow-lg"><i class="fa-solid fa-globe mr-2"></i> VIEW SITE</a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="bg-white shadow-sm p-4 flex justify-between items-center z-10 border-b border-slate-200">
            <h2 class="text-xl font-black text-slate-800" id="topTitle">Live Orders</h2>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50 custom-scrollbar relative">
            <div id="ordersTab" class="tab-content active"> </div>
            <div id="reportsTab" class="tab-content"> </div>
            <div id="productsTab" class="tab-content"> </div>
            <div id="catsTab" class="tab-content"> </div>
            <div id="adsTab" class="tab-content"> </div>
            <div id="settingsTab" class="tab-content"> </div>
            <div id="directorsTab" class="tab-content"> </div>

            <div id="staffTab" class="tab-content max-w-4xl mx-auto">
                <h2 class="text-2xl font-black mb-4">Staff Management</h2>
                <div class="bg-white p-6 rounded-2xl shadow-sm border mb-6">
                    <input type="text" id="sUser" placeholder="Username" class="border p-2 rounded mb-2 w-full">
                    <input type="password" id="sPass" placeholder="Password" class="border p-2 rounded mb-2 w-full">
                    <div class="mb-4 space-y-1">
                        <label><input type="checkbox" class="perm" value="orders"> Orders</label><br>
                        <label><input type="checkbox" class="perm" value="inventory"> Inventory</label><br>
                        <label><input type="checkbox" class="perm" value="reports"> Reports</label>
                    </div>
                    <button onclick="addStaff()" class="bg-blue-600 text-white px-6 py-2 rounded-xl">Save Staff</button>
                </div>
            </div>
        </div>
    </main>

    <script>
    
        const defaultAdmin = { username: "admin", pass: "1234", role: "superadmin", permissions: ["orders", "inventory", "reports", "ads", "staff"] };
        
        function checkAuth() {
            const user = JSON.parse(localStorage.getItem('jsuper_loggedInUser'));
            if (!user) {
                document.getElementById('loginScreen').classList.remove('hidden');
            } else {
                document.getElementById('loginScreen').classList.add('hidden');
                applyPermissions(user);
            }
        }

        function handleLogin() {
            const u = document.getElementById('lUser').value;
            const p = document.getElementById('lPass').value;
            const users = JSON.parse(localStorage.getItem('jsuper_users')) || [defaultAdmin];
            const found = users.find(x => x.username === u && x.pass === p);
            if (found) {
                localStorage.setItem('jsuper_loggedInUser', JSON.stringify(found));
                location.reload();
            } else { alert("වැරදි Username හෝ Password!"); }
        }

        function logout() {
            localStorage.removeItem('jsuper_loggedInUser');
            location.reload();
        }

        function applyPermissions(user) {
            if (user.role === 'superadmin') return; 
            const perms = user.permissions;
            if (!perms.includes('orders')) document.getElementById('btnOrders').style.display = 'none';
            if (!perms.includes('inventory')) document.getElementById('btnInventory').style.display = 'none';
            if (!perms.includes('reports')) document.getElementById('btnReports').style.display = 'none';
            if (!perms.includes('ads')) document.getElementById('btnAds').style.display = 'none';
            document.getElementById('btnStaff').style.display = 'none';
        }

        function addStaff() {
            const username = document.getElementById('sUser').value;
            const password = document.getElementById('sPass').value;
            const perms = Array.from(document.querySelectorAll('.perm:checked')).map(cb => cb.value);
            let users = JSON.parse(localStorage.getItem('jsuper_users')) || [defaultAdmin];
            users.push({ username, pass: password, role: 'staff', permissions: perms });
            localStorage.setItem('jsuper_users', JSON.stringify(users));
            alert("සාර්ථකයි!");
        }
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            const titles = { 'ordersTab': 'Live Orders', 'productsTab': 'Inventory', 'adsTab': 'Banners', 'settingsTab': 'Web Settings', 'directorsTab': 'Directors', 'catsTab': 'Categories', 'reportsTab':'POS & Reports', 'staffTab':'Staff Management' };
            document.getElementById('topTitle').innerText = titles[tabId];
        }
        
        checkAuth();
    </script>
</body>
</html>
